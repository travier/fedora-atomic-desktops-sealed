name: "Build buildroot container image for CI"

env:
  CONTAINERFILE: ".github/Containerfile.buildroot"
  NAME: "${{ github.event.repository.name }}/buildroot"
  REGISTRY: "ghcr.io/${{ github.repository_owner }}"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - ".github/Containerfile.buildroot"
      - ".github/workflows/buildroot.yml"
  push:
    branches:
      - "main"
    paths:
      - ".github/Containerfile.buildroot"
      - ".github/workflows/buildroot.yml"
  schedule:
    - cron:  "0 0 * * MON"
  workflow_dispatch:

# Allow:
# - Read access to the repo content
# - Write access to packages to allow access to GitHub container registry
permissions:
  contents: "read"
  packages: "write"

# Prevent multiple workflow runs from racing to ensure that pushes are made
# sequentialy for the main branch. Also cancel in progress workflow runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-x86_64:
    runs-on: "ubuntu-24.04"
    strategy:
      fail-fast: false
      matrix:
        version: ['44']
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v6.0.2

      - name: "Build container image"
        uses: redhat-actions/buildah-build@v2
        with:
          context: ".github"
          image: ${{ env.NAME }}
          tags: ${{ matrix.version }}-x86_64
          containerfiles: ${{ env.CONTAINERFILE }}
          oci: true
          build-args: |
            VERSION=${{ matrix.version }}

      - name: "Push to Container Registry"
        uses: redhat-actions/push-to-registry@v2
        id: "push"
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.NAME }}
          tags: ${{ matrix.version }}-x86_64

  # build-aarch64:
  #   runs-on: "ubuntu-24.04-arm"
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       version: ['44']
  #   steps:
  #     - name: "Checkout repo"
  #       uses: actions/checkout@v5

  #     - name: "Build container image"
  #       uses: redhat-actions/buildah-build@v2
  #       with:
  #         context: ".github"
  #         image: ${{ env.NAME }}
  #         tags: ${{ matrix.version }}-aarch64
  #         containerfiles: ${{ env.CONTAINERFILE }}
  #         oci: true
  #         build-args: |
  #           VERSION=${{ matrix.version }}

  #     - name: "Push to Container Registry"
  #       uses: redhat-actions/push-to-registry@v2
  #       id: "push"
  #       if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
  #       with:
  #         registry: ${{ env.REGISTRY }}
  #         username: ${{ github.actor }}
  #         password: ${{ secrets.GITHUB_TOKEN }}
  #         image: ${{ env.NAME }}
  #         tags: ${{ matrix.version }}-aarch64

  merge:
    runs-on: "ubuntu-24.04"
    needs:
      - "build-x86_64"
      # - "build-aarch64"
    strategy:
      fail-fast: false
      matrix:
        version: ['44']
    steps:
      - name: "Login to Container Registry"
        uses: redhat-actions/podman-login@v1
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create multi-arch manifest"
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euxo pipefail
          #   "${REGISTRY}/${NAME}:${VERSION}-aarch64"
          buildah manifest create "${REGISTRY}/${NAME}:${VERSION}" \
            "${REGISTRY}/${NAME}:${VERSION}-x86_64"
        env:
          VERSION: ${{ matrix.version }}

      - name: "Push to Container Registry"
        uses: redhat-actions/push-to-registry@v2
        id: "push"
        if: (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.NAME }}
          tags: ${{ matrix.version }}
